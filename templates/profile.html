<!DOCTYPE html>
<html>
<head>
    <title>My Pokémon Library</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav class="top-nav">

    <div class="logo-area">
        <strong>{{ username }}'s Pokédex</strong>
    </div>

    <div class="nav-right">
        <a href="/">Scanner</a>
        <a href="/library">Library</a>
        <a href="/trades">PokéFeed</a>
        <a href="/users">Users</a>
        <a href="/account">Account</a>
        <a href="/logout">Logout</a>
    </div>

</nav>

<main class="profile-page">

    <section class="profile-card">

        <div class="account-header">

            <div class="account-header-text">

                <h1>{{ username }}</h1>

                <p>
                    Manage your profile picture and Pokémon card library.
                </p>

                <form
                    action="/upload-profile"
                    method="POST"
                    enctype="multipart/form-data"
                >

                    <input
                        type="file"
                        name="profile_image"
                        accept="image/*"
                        required
                    >

                    <button type="submit">
                        Upload Profile Picture
                    </button>

                </form>

            </div>

            {% if profile_image %}
                <img
                    src="{{ profile_image }}"
                    class="big-profile-pic"
                >
            {% endif %}

        </div>

        <hr>

        <h1>My Pokémon Collection</h1>

        <div class="collection-stats">

            <div class="stat-box">
                <h2 id="total-cards">0</h2>
                <p>Cards</p>
            </div>

            <div class="stat-box">
                <h2 id="trade-count">0</h2>
                <p>Trading</p>
            </div>

            <div class="stat-box">
                <h2 id="wishlist-count">0</h2>
                <p>Wishlist</p>
            </div>

        </div>

        <input
            type="text"
            id="search-bar"
            placeholder="Search Pokémon..."
            onkeyup="showProfileLibrary()"
        >

        <div class="filter-buttons">

            <button onclick="setFilter('All')">All</button>

            <button onclick="setFilter('Keep')">Keep</button>

            <button onclick="setFilter('Trade')">Trade</button>

            <button onclick="setFilter('Sell')">Sell</button>

            <button onclick="setFilter('Want')">Want</button>

        </div>

        <div id="profile-library" class="pokemon-grid"></div>

    </section>

</main>

<script>

let currentFilter = "All";

function setFilter(status) {
    currentFilter = status;
    showProfileLibrary();
}

function showProfileLibrary() {

    const collection =
        JSON.parse(localStorage.getItem("collection")) || {};

    const library =
        document.getElementById("profile-library");

    const search =
        document.getElementById("search-bar")
        .value
        .toLowerCase();

    library.innerHTML = "";

    const cards = Object.values(collection);

    document.getElementById("total-cards").innerText =
        cards.length;

    document.getElementById("trade-count").innerText =
        cards.filter(card => card.status === "Trade").length;

    document.getElementById("wishlist-count").innerText =
        cards.filter(card => card.status === "Want").length;

    cards.forEach(card => {

        const matchesSearch =
            card.name.toLowerCase().includes(search);

        const matchesFilter =
            currentFilter === "All"
            || (card.status || "Keep") === currentFilter;

        if (!matchesSearch || !matchesFilter) {
            return;
        }

        const item = document.createElement("div");

        item.className = "pokemon-tile";

        item.innerHTML = `
            <a href="/card/${card.name}" class="card-link">

                <img
                    src="/static/card_images/${card.name}.png"
                    onerror="this.style.display='none'"
                >

                <div class="pokemon-info">

                    <h2>${card.name}</h2>

                    <p>x${card.quantity}</p>

                    <span class="status-badge">
                        ${card.status || "Keep"}
                    </span>

                </div>

            </a>
        `;

        library.appendChild(item);

    });

}

window.addEventListener("load", showProfileLibrary);

</script>

</body>
</html>
