<!DOCTYPE html>
<html>
<head>
    <title>PokéFeed</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav class="top-nav">
    <div class="logo-area">
        <strong>PokéFeed</strong>
    </div>

    <div class="nav-right">
        <a href="/">Scanner</a>
        <a href="/library">Library</a>
        <a href="/pokedex">Pokédex</a>
        <a href="/trades">Feed</a>
        <a href="/users">Users</a>
        <a href="/notifications">
            🔔
            <span id="nav-notification-count" class="notification-badge">0</span>
        </a>
        <a href="/account">Account</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<main class="pokefeed-page">

    <section class="create-post-card">
        <h1>Create Post</h1>
        <p>Share a card you want to trade with other collectors.</p>

        <div class="post-form-grid">
            <div>
                <label>Card I am offering</label>
                <select id="have-card"></select>
            </div>

            <div>
                <label>Quantity</label>
                <input id="trade-quantity" type="number" min="1" value="1">
            </div>

            <div>
                <label>What I want</label>
                <input id="want-card" placeholder="Example: Ho-Oh, Meowstic, any Fire card">
            </div>
        </div>

        <label>Caption</label>
        <textarea id="trade-message" placeholder="Write a caption for your PokéFeed post..."></textarea>

        <button onclick="createTradePost()">Post to PokéFeed</button>
    </section>

    <section class="feed-wrapper">
    <h2>Latest Posts</h2>

    <div class="trending-card-box">
        <h3>🔥 Trending Cards</h3>
        <div id="trending-cards"></div>
    </div>

    <div class="feed-filter-bar">
        <button onclick="setFeedFilter('All')">All</button>
        <button onclick="setFeedFilter('Mine')">My Posts</button>
        <button onclick="setFeedFilter('Saved')">Saved</button>
        <button onclick="setFeedFilter('Trade')">Trade Offers</button>
        <button onclick="setFeedFilter('Following')">Following</button>
    </div>

    <div class="market-search-bar">
        <input
            id="market-search"
            placeholder="Search trades, cards, users, or wants..."
            onkeyup="showTradePosts()"
        >

        <select id="market-type-filter" onchange="showTradePosts()">
            <option value="All">All Types</option>
            <option value="Fire">Fire</option>
            <option value="Water">Water</option>
            <option value="Grass">Grass</option>
            <option value="Psychic">Psychic</option>
            <option value="Poison">Poison</option>
            <option value="Ice">Ice</option>
            <option value="Electric">Electric</option>
            <option value="Fighting">Fighting</option>
            <option value="Ghost">Ghost</option>
            <option value="Dark">Dark</option>
        </select>
    </div>

    <div id="trade-posts" class="instagram-feed"></div>
</section>

</main>

<script>
const currentUser = "{{ username }}";
let feedFilter = "All";

function createNotification(to, title, message) {
    if (to === currentUser) {
        return;
    }

    const notifications =
        JSON.parse(localStorage.getItem("notifications")) || [];

    notifications.push({
        to: to,
        from: currentUser,
        title: title,
        message: message,
        date: new Date().toLocaleString()
    });

    localStorage.setItem(
        "notifications",
        JSON.stringify(notifications)
    );
}

function setFeedFilter(filter) {
    feedFilter = filter;
    showTradePosts();
}

function getFollowing() {
    return JSON.parse(localStorage.getItem("following")) || {};
}

function saveFollowing(following) {
    localStorage.setItem("following", JSON.stringify(following));
}

function isFollowingUser(username) {
    const following = getFollowing();

    if (!following[currentUser]) {
        following[currentUser] = [];
    }

    return following[currentUser].includes(username);
}

function toggleFollowFromPost(username) {
    const following = getFollowing();

    if (!following[currentUser]) {
        following[currentUser] = [];
    }

    if (following[currentUser].includes(username)) {
        following[currentUser] =
            following[currentUser].filter(user => user !== username);
    } else {
        following[currentUser].push(username);

        createNotification(
            username,
            "New Follower",
            `@${currentUser} followed you.`
        );
    }

    saveFollowing(following);
    showTradePosts();
}


function loadHaveCards() {
    const collection = JSON.parse(localStorage.getItem("collection")) || {};
    const cards = Object.values(collection);
    const select = document.getElementById("have-card");

    select.innerHTML = "";

    if (cards.length === 0) {
        select.innerHTML = "<option>No cards in library yet</option>";
        return;
    }

    cards.forEach(card => {
        const option = document.createElement("option");
        option.value = card.name;
        option.dataset.quantity = card.quantity;
        option.textContent = `${card.name} x${card.quantity}`;
        select.appendChild(option);
    });

    updateMaxQuantity();
}

function updateMaxQuantity() {
    const select = document.getElementById("have-card");
    const selectedOption = select.options[select.selectedIndex];
    const maxQuantity = selectedOption ? Number(selectedOption.dataset.quantity || 1) : 1;

    const quantityInput = document.getElementById("trade-quantity");
    quantityInput.max = maxQuantity;

    if (Number(quantityInput.value) > maxQuantity) {
        quantityInput.value = maxQuantity;
    }
}

document.addEventListener("change", function(event) {
    if (event.target.id === "have-card") {
        updateMaxQuantity();
    }
});

function createTradePost() {
    const haveSelect = document.getElementById("have-card");
    const selectedOption = haveSelect.options[haveSelect.selectedIndex];

    const haveCard = haveSelect.value;
    const maxQuantity = selectedOption ? Number(selectedOption.dataset.quantity || 1) : 1;
    const quantity = Number(document.getElementById("trade-quantity").value);
    const wantCard = document.getElementById("want-card").value.trim();
    const message = document.getElementById("trade-message").value.trim();

   if (!haveCard || !wantCard || !message) {
        alert("Please fill in all fields.");
        console.log("Missing fields:", haveCard, wantCard, message);
        return;
    }

    if (quantity < 1 || quantity > maxQuantity) {
        alert(`You can trade between 1 and ${maxQuantity} of this card.`);
        return;
    }

    const posts = JSON.parse(localStorage.getItem("tradePosts")) || [];

    posts.unshift({
        id: Date.now(),
        user: currentUser,
        haveCard: haveCard,
        quantity: quantity,
        wantCard: wantCard,
        message: message,
        date: new Date().toLocaleDateString(),
        stars: [],
        savedBy: [],
        comments: [],
        offers: [],
        messages: []
    });

    localStorage.setItem("tradePosts", JSON.stringify(posts));

    document.getElementById("trade-quantity").value = 1;
    document.getElementById("want-card").value = "";
    document.getElementById("trade-message").value = "";

    feedFilter = "All";
    renderTrendingCards();
    showTradePosts();
}

function renderTrendingCards() {
    const posts = JSON.parse(localStorage.getItem("tradePosts")) || {};
    const scores = {};

    posts.forEach(post => {
        const cardName = post.haveCard;

        if (!scores[cardName]) {
            scores[cardName] = 0;
        }

        scores[cardName] += 1;
        scores[cardName] += (post.stars || []).length;
        scores[cardName] += (post.savedBy || []).length;
        scores[cardName] += (post.comments || []).length;
        scores[cardName] += (post.offers || []).length;
    });

    const trending = Object.entries(scores)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5);

    const container = document.getElementById("trending-cards");

    if (!container) return;

    if (trending.length === 0) {
        container.innerHTML = "<p>No trending cards yet.</p>";
        return;
    }

    container.innerHTML = "";

    trending.forEach(([cardName, score], index) => {
        const item = document.createElement("div");
        item.className = "trending-card-item";

        item.innerHTML = `
            <span>#${index + 1}</span>
            <img src="/static/card_images/${cardName}.png" onerror="this.style.display='none'">
            <strong>${cardName}</strong>
            <small>${score} points</small>
        `;

        container.appendChild(item);
    });
}

function showTradePosts() {
    const posts = JSON.parse(localStorage.getItem("tradePosts")) || [];
    const container = document.getElementById("trade-posts");

    container.innerHTML = "";

    if (posts.length === 0) {
        container.innerHTML = "<p>No PokéFeed posts yet.</p>";
        return;
    }

    posts.forEach((post, index) => {
        post.stars = post.stars || [];
        post.savedBy = post.savedBy || [];
        post.comments = post.comments || [];
        post.offers = post.offers || [];
        post.messages = post.messages || [];

        const isMine = post.user === currentUser;

        const isSaved =
            post.savedBy &&
            post.savedBy.includes(currentUser);

        const hasOffer =
            post.offers &&
            post.offers.length > 0;

        const following =
            JSON.parse(localStorage.getItem("following")) || {};

        const myFollowing =
            following[currentUser] || [];

        if (feedFilter === "Mine" && !isMine) return;

        if (feedFilter === "Saved" && !isSaved) return;

        if (feedFilter === "Trade" && !hasOffer) return;

        if (
            feedFilter === "Following" &&
            !myFollowing.includes(post.user)
        ) return;

        const starred = post.stars.includes(currentUser);
        const saved = post.savedBy.includes(currentUser);

        const item = document.createElement("article");
        item.className = "poke-post";

        item.innerHTML = `
            <div class="poke-post-header">
                <div>
                    <h3>
                        <a href="/user/${post.user}" class="user-link">
                            @${post.user}
                        </a>
                    </h3>

                    ${post.user !== currentUser ? `
                        <button class="mini-follow-btn" onclick="toggleFollowFromPost('${post.user}')">
                            ${isFollowingUser(post.user) ? "Following" : "Follow"}
                        </button>
                    ` : ""}

                    <span>${post.date}</span>
                </div>

                <div class="post-header-buttons">
                    <button
                        class="save-post-btn ${saved ? "saved-active" : ""}"
                        onclick="toggleSavePost(${index})"
                    >
                        ${saved ? "Saved" : "Save"}
                    </button>

                    ${post.user === currentUser ? `
                        <button
                            class="delete-post-btn"
                            onclick="deletePost(${index})"
                        >
                            Delete
                        </button>
                    ` : ""}
                </div>
            </div>

            <div class="poke-post-image">
                <img
                    src="/static/card_images/${post.haveCard}.png"
                    onerror="this.style.display='none'"
                >
            </div>

            <div class="poke-post-body">
                <p><strong>@${post.user}</strong> ${post.message}</p>

                <div class="trade-summary">
                    <span>Offering: <strong>${post.haveCard} x${post.quantity}</strong></span>
                    <span>Wants: <strong>${post.wantCard}</strong></span>
                </div>

                <div class="feed-actions">
                    <button class="${starred ? "star-active" : ""}" onclick="starPost(${index})">
                        ${starred ? "★ Starred" : "☆ Star"} (${post.stars.length})
                    </button>

                    <button onclick="offerTrade(${index})">Offer Trade</button>
                    
                    <button onclick="markTradeSuccessful(${index})">
                        Mark Trade Successful
                    </button>

                    <button onclick="openChat(${post.id})">Message</button>
                    <button onclick="toggleComments(${post.id})">
                        Comments (${post.comments.length})
                    </button>
                </div>

                <div id="comments-${post.id}" class="comments-box hidden">
                    <h4>Comments</h4>

                    ${post.comments.length === 0 ? "<p>No comments yet.</p>" : ""}

                    ${post.comments.map(comment => `
                        <div class="comment">
                            <strong>@${comment.user}</strong>
                            <p>${comment.text}</p>
                        </div>
                    `).join("")}

                    <input
                        id="comment-input-${post.id}"
                        placeholder="Write a comment..."
                    >

                    <button onclick="addComment(${index}, ${post.id})">
                        Comment
                    </button>

                    <div class="offers-box">
                        <h4>Trade Offers</h4>
                        ${
                            post.offers.length === 0
                            ? "<p>No offers yet.</p>"
                            : post.offers.map(offer => `
                                <div class="offer-card">
                                    <div class="offer-header">
                                        🤝 Trade Offer
                                    </div>

                                    <div class="offer-user">
                                        @${offer.user}
                                    </div>

                                    <div class="offer-text">
                                        ${offer.offerText}
                                    </div>

                                    <div class="offer-actions">
                                        <button onclick="acceptTradeOffer('${offer.user}')">
                                            Accept
                                        </button>

                                        <button onclick="declineTradeOffer('${offer.user}')">
                                            Decline
                                        </button>
                                    </div>
                                </div>
                            `).join("")
                        }
                    </div>

                    <div class="chat-box" id="chat-${post.id}">
                        <h4>Messages</h4>

                        <div class="chat-messages">
                            ${
                                post.messages.length === 0
                                ? "<p>No messages yet.</p>"
                                : post.messages.map(message => `
                                    <div class="chat-message ${message.user === currentUser ? "mine" : "theirs"}">
                                        <strong>@${message.user}</strong>
                                        <p>${message.text}</p>
                                        <small>${message.time || ""}</small>
                                    </div>
                                `).join("")
                            }
                        </div>

                        <div class="chat-input-row">
                            <input
                                id="message-input-${post.id}"
                                placeholder="Type a message..."
                            >

                            <button onclick="sendChatMessage(${index}, ${post.id})">
                                Send
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `;

        container.appendChild(item);
    });

    localStorage.setItem("tradePosts", JSON.stringify(posts));
}


function getPokemonType(name) {
    const types = {
        "Avalugg": "Ice",
        "Baltoy": "Psychic",
        "Bergmite": "Ice",
        "Delibird": "Ice",
        "Donphan": "Fighting",
        "Froakie": "Water",
        "Garbodor": "Poison",
        "Ho-Oh": "Fire / Flying",
        "Litleo": "Fire",
        "Mareep": "Electric",
        "Meowstic": "Psychic",
        "Ninetales": "Fire",
        "Ninetails": "Fire",
        "Phantump": "Ghost / Grass",
        "Pumpkaboo": "Ghost / Grass",
        "Quilladin": "Grass",
        "Stunky": "Dark / Poison",
        "Vulpix": "Fire",
        "Zubat": "Poison / Flying"
    };

    return types[name] || "Unknown";
}


function starPost(index) {
    const posts = JSON.parse(localStorage.getItem("tradePosts")) || [];
    posts[index].stars = posts[index].stars || [];

    if (posts[index].stars.includes(currentUser)) {
        posts[index].stars = posts[index].stars.filter(user => user !== currentUser);
    } else {
        posts[index].stars.push(currentUser);
    }

    createNotification(
        posts[index].user,
        "New Star",
        `@${currentUser} starred your ${posts[index].haveCard} post.`
    );

    localStorage.setItem("tradePosts", JSON.stringify(posts));
    showTradePosts();
}

function toggleSavePost(index) {
    const posts = JSON.parse(localStorage.getItem("tradePosts")) || [];
    posts[index].savedBy = posts[index].savedBy || [];

    if (posts[index].savedBy.includes(currentUser)) {
        posts[index].savedBy = posts[index].savedBy.filter(user => user !== currentUser);
    } else {
        posts[index].savedBy.push(currentUser);
    }

    localStorage.setItem("tradePosts", JSON.stringify(posts));
    showTradePosts();
}

function deletePost(index) {
    const posts = JSON.parse(localStorage.getItem("tradePosts")) || [];

    if (posts[index].user !== currentUser) {
        alert("You can only delete your own posts.");
        return;
    }

    if (confirm("Delete this post?")) {
        posts.splice(index, 1);
        localStorage.setItem("tradePosts", JSON.stringify(posts));
        showTradePosts();
    }
}

function toggleComments(postId) {
    document.getElementById(`comments-${postId}`).classList.toggle("hidden");
}

function openChat(postId) {
    const box = document.getElementById(`comments-${postId}`);
    box.classList.remove("hidden");

    setTimeout(() => {
        const input = document.getElementById(`message-input-${postId}`);
        if (input) {
            input.focus();
        }
    }, 100);
}

function addComment(index, postId) {
    const input = document.getElementById(`comment-input-${postId}`);
    const text = input.value.trim();

    if (!text) {
        return;
    }

    const posts = JSON.parse(localStorage.getItem("tradePosts")) || [];

    posts[index].comments = posts[index].comments || [];
    posts[index].comments.push({
        user: currentUser,
        text: text
    });

    createNotification(
        posts[index].user,
        "New Comment",
        `@${currentUser} commented on your ${posts[index].haveCard} post.`
    );

    localStorage.setItem("tradePosts", JSON.stringify(posts));
    showTradePosts();

    setTimeout(() => {
        const box = document.getElementById(`comments-${postId}`);
        if (box) {
            box.classList.remove("hidden");
        }
    }, 100);
}

function offerTrade(index) {
    const offerText = prompt("What card or deal do you want to offer?");

    if (!offerText) {
        return;
    }

    const posts = JSON.parse(localStorage.getItem("tradePosts")) || [];

    posts[index].offers = posts[index].offers || [];
    posts[index].offers.push({
        user: currentUser,
        offerText: offerText
    });

    createNotification(
        posts[index].user,
        "New Trade Offer",
        `@${currentUser} made an offer for your ${posts[index].haveCard}.`
    );

    localStorage.setItem("tradePosts", JSON.stringify(posts));
    showTradePosts();
}

function markTradeSuccessful(index) {
    const posts = JSON.parse(localStorage.getItem("tradePosts")) || [];
    const post = posts[index];

    const successfulTrades =
        JSON.parse(localStorage.getItem("successfulTrades")) || [];

    successfulTrades.push({
        users: [currentUser, post.user],
        card: post.haveCard,
        date: new Date().toLocaleDateString()
    });

    localStorage.setItem(
        "successfulTrades",
        JSON.stringify(successfulTrades)
    );

    createNotification(
        post.user,
        "Successful Trade",
        `@${currentUser} marked your ${post.haveCard} trade as successful.`
    );

    alert("Trade marked as successful!");
}

function markTradeSuccessful(index) {
    const posts = JSON.parse(localStorage.getItem("tradePosts")) || [];
    const post = posts[index];

    const successfulTrades =
        JSON.parse(localStorage.getItem("successfulTrades")) || [];

    successfulTrades.push({
        users: [currentUser, post.user],
        card: post.haveCard,
        date: new Date().toLocaleDateString()
    });

    localStorage.setItem(
        "successfulTrades",
        JSON.stringify(successfulTrades)
    );

    createNotification(
        post.user,
        "Successful Trade",
        `@${currentUser} marked your ${post.haveCard} trade as successful.`
    );

    alert("Trade marked as successful!");
}

function sendChatMessage(index, postId) {
    const input = document.getElementById(`message-input-${postId}`);
    const text = input.value.trim();

    if (!text) {
        return;
    }

    const posts = JSON.parse(localStorage.getItem("tradePosts")) || [];

    posts[index].messages = posts[index].messages || [];
    posts[index].messages.push({
        user: currentUser,
        text: text,
        time: new Date().toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit"
        })
    });

    createNotification(
     posts[index].user,
        "New Message",
        `@${currentUser} sent you a message about ${posts[index].haveCard}.`
    );

    localStorage.setItem("tradePosts", JSON.stringify(posts));
    showTradePosts();

    setTimeout(() => {
        const box = document.getElementById(`comments-${postId}`);
        if (box) {
            box.classList.remove("hidden");

            const messages = box.querySelector(".chat-messages");
            if (messages) {
                messages.scrollTop = messages.scrollHeight;
            }
        }
    }, 100);
}

window.addEventListener("load", () => {
    loadHaveCards();
    renderTrendingCards();
    showTradePosts();
});
</script>

<script>
function updateNotificationBadge() {
    const currentUser = "{{ username }}";
    const notifications = JSON.parse(localStorage.getItem("notifications")) || [];
    const count = notifications.filter(note => note.to === currentUser).length;

    const badge = document.getElementById("nav-notification-count");

    if (badge) {
        badge.innerText = count;

        if (count === 0) {
            badge.style.display = "none";
        } else {
            badge.style.display = "inline-flex";
        }
    }
}


function acceptTradeOffer(username) {
    alert(`Trade accepted with ${username}`);

    createNotification(
        username,
        "Trade Accepted",
        `${currentUser} accepted your trade offer.`
    );
}

function declineTradeOffer(username) {
    alert(`Trade declined with ${username}`);

    createNotification(
        username,
        "Trade Declined",
        `${currentUser} declined your trade offer.`
    );
}

window.addEventListener("load", updateNotificationBadge);
</script>

</body>
</html>
