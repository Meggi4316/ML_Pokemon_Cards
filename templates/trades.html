<!DOCTYPE html>
<html>
<head>
    <title>PokéFeed</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav class="top-nav">
    <div class="logo-area">
        <strong>PokéFeed</strong>
    </div>

    <div class="nav-right">
        <a href="/">Scanner</a>
        <a href="/library">Library</a>
        <a href="/trades">PokéFeed</a>
        <a href="/users">Users</a>
        <a href="/account">Account</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<main class="pokefeed-page">

    <section class="create-post-card">
        <h1>Create Post</h1>
        <p>Share a card you want to trade with other collectors.</p>

        <div class="post-form-grid">
            <div>
                <label>Card I am offering</label>
                <select id="have-card"></select>
            </div>

            <div>
                <label>Quantity</label>
                <input id="trade-quantity" type="number" min="1" value="1">
            </div>

            <div>
                <label>What I want</label>
                <input id="want-card" placeholder="Example: Ho-Oh, Meowstic, any Fire card">
            </div>
        </div>

        <label>Caption</label>
        <textarea id="trade-message" placeholder="Write a caption for your PokéFeed post..."></textarea>

        <button onclick="createTradePost()">Post to PokéFeed</button>
    </section>

    <section class="feed-wrapper">
        <h2>Latest Posts</h2>

        <div class="feed-filter-bar">
            <button onclick="setFeedFilter('All')">All</button>
            <button onclick="setFeedFilter('Mine')">My Posts</button>
            <button onclick="setFeedFilter('Saved')">Saved</button>
            <button onclick="setFeedFilter('Trade')">Trade Offers</button>
        </div>

        <div id="trade-posts" class="instagram-feed"></div>
    </section>

</main>

<script>
const currentUser = "{{ username }}";
let feedFilter = "All";

function setFeedFilter(filter) {
    feedFilter = filter;
    showTradePosts();
}

function loadHaveCards() {
    const collection = JSON.parse(localStorage.getItem("collection")) || {};
    const cards = Object.values(collection);
    const select = document.getElementById("have-card");

    select.innerHTML = "";

    if (cards.length === 0) {
        select.innerHTML = "<option>No cards in library yet</option>";
        return;
    }

    cards.forEach(card => {
        const option = document.createElement("option");
        option.value = card.name;
        option.dataset.quantity = card.quantity;
        option.textContent = `${card.name} x${card.quantity}`;
        select.appendChild(option);
    });

    updateMaxQuantity();
}

function updateMaxQuantity() {
    const select = document.getElementById("have-card");
    const selectedOption = select.options[select.selectedIndex];
    const maxQuantity = selectedOption ? Number(selectedOption.dataset.quantity || 1) : 1;

    const quantityInput = document.getElementById("trade-quantity");
    quantityInput.max = maxQuantity;

    if (Number(quantityInput.value) > maxQuantity) {
        quantityInput.value = maxQuantity;
    }
}

document.addEventListener("change", function(event) {
    if (event.target.id === "have-card") {
        updateMaxQuantity();
    }
});

function createTradePost() {
    const haveSelect = document.getElementById("have-card");
    const selectedOption = haveSelect.options[haveSelect.selectedIndex];

    const haveCard = haveSelect.value;
    const maxQuantity = selectedOption ? Number(selectedOption.dataset.quantity || 1) : 1;
    const quantity = Number(document.getElementById("trade-quantity").value);
    const wantCard = document.getElementById("want-card").value.trim();
    const message = document.getElementById("trade-message").value.trim();

    if (!haveCard || !wantCard || !message) {
        alert("Please fill in all fields.");
        return;
    }

    if (quantity < 1 || quantity > maxQuantity) {
        alert(`You can trade between 1 and ${maxQuantity} of this card.`);
        return;
    }

    const posts = JSON.parse(localStorage.getItem("tradePosts")) || [];

    posts.unshift({
        id: Date.now(),
        user: currentUser,
        haveCard: haveCard,
        quantity: quantity,
        wantCard: wantCard,
        message: message,
        date: new Date().toLocaleDateString(),
        stars: [],
        savedBy: [],
        comments: [],
        offers: [],
        messages: []
    });

    localStorage.setItem("tradePosts", JSON.stringify(posts));

    document.getElementById("trade-quantity").value = 1;
    document.getElementById("want-card").value = "";
    document.getElementById("trade-message").value = "";

    showTradePosts();
}

function showTradePosts() {
    const posts = JSON.parse(localStorage.getItem("tradePosts")) || [];
    const container = document.getElementById("trade-posts");

    container.innerHTML = "";

    if (posts.length === 0) {
        container.innerHTML = "<p>No PokéFeed posts yet.</p>";
        return;
    }

    posts.forEach((post, index) => {
        post.stars = post.stars || [];
        post.savedBy = post.savedBy || [];
        post.comments = post.comments || [];
        post.offers = post.offers || [];
        post.messages = post.messages || [];

        const isMine = post.user === currentUser;
        const isSaved = post.savedBy.includes(currentUser);
        const hasOffer = post.offers.length > 0;

        if (
            (feedFilter === "Mine" && !isMine) ||
            (feedFilter === "Saved" && !isSaved) ||
            (feedFilter === "Trade" && !hasOffer)
        ) {
            return;
        }

        const starred = post.stars.includes(currentUser);
        const saved = post.savedBy.includes(currentUser);

        const item = document.createElement("article");
        item.className = "poke-post";

        item.innerHTML = `
            <div class="poke-post-header">
                <div>
                    <h3>
                        <a href="/user/${post.user}" class="user-link">
                            @${post.user}
                        </a>
                    </h3>
                    <span>${post.date}</span>
                </div>

                <div class="post-header-buttons">
                    <button
                        class="save-post-btn ${saved ? "saved-active" : ""}"
                        onclick="toggleSavePost(${index})"
                    >
                        ${saved ? "Saved" : "Save"}
                    </button>

                    ${post.user === currentUser ? `
                        <button
                            class="delete-post-btn"
                            onclick="deletePost(${index})"
                        >
                            Delete
                        </button>
                    ` : ""}
                </div>
            </div>

            <div class="poke-post-image">
                <img
                    src="/static/card_images/${post.haveCard}.png"
                    onerror="this.style.display='none'"
                >
            </div>

            <div class="poke-post-body">
                <p><strong>@${post.user}</strong> ${post.message}</p>

                <div class="trade-summary">
                    <span>Offering: <strong>${post.haveCard} x${post.quantity}</strong></span>
                    <span>Wants: <strong>${post.wantCard}</strong></span>
                </div>

                <div class="feed-actions">
                    <button class="${starred ? "star-active" : ""}" onclick="starPost(${index})">
                        ${starred ? "★ Starred" : "☆ Star"} (${post.stars.length})
                    </button>

                    <button onclick="offerTrade(${index})">Offer Trade</button>
                    <button onclick="openChat(${post.id})">Message</button>
                    <button onclick="toggleComments(${post.id})">
                        Comments (${post.comments.length})
                    </button>
                </div>

                <div id="comments-${post.id}" class="comments-box hidden">
                    <h4>Comments</h4>

                    ${post.comments.length === 0 ? "<p>No comments yet.</p>" : ""}

                    ${post.comments.map(comment => `
                        <div class="comment">
                            <strong>@${comment.user}</strong>
                            <p>${comment.text}</p>
                        </div>
                    `).join("")}

                    <input
                        id="comment-input-${post.id}"
                        placeholder="Write a comment..."
                    >

                    <button onclick="addComment(${index}, ${post.id})">
                        Comment
                    </button>

                    <div class="offers-box">
                        <h4>Trade Offers</h4>
                        ${
                            post.offers.length === 0
                            ? "<p>No offers yet.</p>"
                            : post.offers.map(offer => `
                                <p>
                                    <strong>@${offer.user}</strong>
                                    offered ${offer.offerText}
                                </p>
                            `).join("")
                        }
                    </div>

                    <div class="chat-box" id="chat-${post.id}">
                        <h4>Messages</h4>

                        <div class="chat-messages">
                            ${
                                post.messages.length === 0
                                ? "<p>No messages yet.</p>"
                                : post.messages.map(message => `
                                    <div class="chat-message ${message.user === currentUser ? "mine" : "theirs"}">
                                        <strong>@${message.user}</strong>
                                        <p>${message.text}</p>
                                    </div>
                                `).join("")
                            }
                        </div>

                        <div class="chat-input-row">
                            <input
                                id="message-input-${post.id}"
                                placeholder="Type a message..."
                            >

                            <button onclick="sendChatMessage(${index}, ${post.id})">
                                Send
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `;

        container.appendChild(item);
    });

    localStorage.setItem("tradePosts", JSON.stringify(posts));
}

function starPost(index) {
    const posts = JSON.parse(localStorage.getItem("tradePosts")) || [];
    posts[index].stars = posts[index].stars || [];

    if (posts[index].stars.includes(currentUser)) {
        posts[index].stars = posts[index].stars.filter(user => user !== currentUser);
    } else {
        posts[index].stars.push(currentUser);
    }

    localStorage.setItem("tradePosts", JSON.stringify(posts));
    showTradePosts();
}

function toggleSavePost(index) {
    const posts = JSON.parse(localStorage.getItem("tradePosts")) || [];
    posts[index].savedBy = posts[index].savedBy || [];

    if (posts[index].savedBy.includes(currentUser)) {
        posts[index].savedBy = posts[index].savedBy.filter(user => user !== currentUser);
    } else {
        posts[index].savedBy.push(currentUser);
    }

    localStorage.setItem("tradePosts", JSON.stringify(posts));
    showTradePosts();
}

function deletePost(index) {
    const posts = JSON.parse(localStorage.getItem("tradePosts")) || [];

    if (posts[index].user !== currentUser) {
        alert("You can only delete your own posts.");
        return;
    }

    if (confirm("Delete this post?")) {
        posts.splice(index, 1);
        localStorage.setItem("tradePosts", JSON.stringify(posts));
        showTradePosts();
    }
}

function toggleComments(postId) {
    document.getElementById(`comments-${postId}`).classList.toggle("hidden");
}

function openChat(postId) {
    const box = document.getElementById(`comments-${postId}`);
    box.classList.remove("hidden");

    setTimeout(() => {
        const input = document.getElementById(`message-input-${postId}`);
        if (input) {
            input.focus();
        }
    }, 100);
}

function addComment(index, postId) {
    const input = document.getElementById(`comment-input-${postId}`);
    const text = input.value.trim();

    if (!text) {
        return;
    }

    const posts = JSON.parse(localStorage.getItem("tradePosts")) || [];

    posts[index].comments = posts[index].comments || [];
    posts[index].comments.push({
        user: currentUser,
        text: text
    });

    localStorage.setItem("tradePosts", JSON.stringify(posts));
    showTradePosts();

    setTimeout(() => {
        const box = document.getElementById(`comments-${postId}`);
        if (box) {
            box.classList.remove("hidden");
        }
    }, 100);
}

function offerTrade(index) {
    const offerText = prompt("What card or deal do you want to offer?");

    if (!offerText) {
        return;
    }

    const posts = JSON.parse(localStorage.getItem("tradePosts")) || [];

    posts[index].offers = posts[index].offers || [];
    posts[index].offers.push({
        user: currentUser,
        offerText: offerText
    });

    localStorage.setItem("tradePosts", JSON.stringify(posts));
    showTradePosts();
}

function sendChatMessage(index, postId) {
    const input = document.getElementById(`message-input-${postId}`);
    const text = input.value.trim();

    if (!text) {
        return;
    }

    const posts = JSON.parse(localStorage.getItem("tradePosts")) || [];

    posts[index].messages = posts[index].messages || [];
    posts[index].messages.push({
        user: currentUser,
        text: text
    });

    localStorage.setItem("tradePosts", JSON.stringify(posts));
    showTradePosts();

    setTimeout(() => {
        const box = document.getElementById(`comments-${postId}`);
        if (box) {
            box.classList.remove("hidden");
        }
    }, 100);
}

window.addEventListener("load", () => {
    loadHaveCards();
    showTradePosts();
});
</script>

</body>
</html>
