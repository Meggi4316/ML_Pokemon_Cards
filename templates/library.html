<!DOCTYPE html>
<html>
<head>
    <title>PokéScan Library</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav class="top-nav">
    <div class="logo-area">
        <strong>PokéScan Library</strong>
    </div>

    <div class="nav-right">
        <a href="/">Scanner</a>
        <a href="/library">Library</a>
        <a href="/pokedex">Pokédex</a>
        <a href="/trades">Feed</a>
        <a href="/search">Search</a>
        <a href="/trade-checker">Trade Checker</a>
        <a href="/users">Users</a>
        <a href="/notifications">
            🔔
            <span id="nav-notification-count" class="notification-badge">0</span>
        </a>
        <a href="/account">Account</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<main class="profile-page">
    <section class="profile-card">
        <h1>My Pokémon Collection</h1>
        <p>View your scanned cards, quantities, and trade status.</p>

        <div class="collection-stats">
    <div class="stat-box">
        <h2 id="total-cards">0</h2>
        <p>Cards</p>
    </div>

    <div class="stat-box">
        <h2 id="trade-count">0</h2>
        <p>Trading</p>
    </div>

    <div class="stat-box">
        <h2 id="wishlist-count">0</h2>
        <p>Wishlist</p>
    </div>

    <div class="stat-box">
        <h2 id="collection-value">$0</h2>
        <p>Estimated Value</p>
    </div>

    <div class="stat-box">
            <h2 id="top-card">None</h2>
            <p>Top Card</p>
        </div>
    </div>

        <div class="library-tabs">
            <button onclick="showCardsView()">Cards</button>
            <button onclick="showPokemonView()">Pokémon View</button>
        </div>

        <input id="search-bar" placeholder="Search your cards..." onkeyup="showLibrary()">

        <div class="filter-buttons">
            <button onclick="setFilter('All')">All</button>
            <button onclick="setFilter('Keep')">Keep</button>
            <button onclick="setFilter('Trade')">Trade</button>
            <button onclick="setFilter('Sell')">Sell</button>
            <button onclick="setFilter('Want')">Want</button>
            <button onclick="setFilter('Favourite')">Favourites</button>    
         
            <button onclick="exportCollection()">
                Export Collection
            </button>
        
        
        </div>

        <div id="profile-library" class="pokemon-grid"></div>

        <div id="pokemon-view" class="pokemon-grid hidden"></div>
    </section>
</main>

<script>
function getRarityText(name) {

    const legendaryTier = [
        "Ho-Oh"
    ];

    const rareTier = [
        "Garbodor",
        "Donphan",
        "Avalugg",
        "Ninetales",
        "Ninetails"
    ];

    const uncommonTier = [
        "Meowstic",
        "Quilladin",
        "Delibird"
    ];

    if (legendaryTier.includes(name)) {
        return "Legendary Tier";
    }

    if (rareTier.includes(name)) {
        return "Rare Tier";
    }

    if (uncommonTier.includes(name)) {
        return "Uncommon Tier";
    }

    return "Basic Tier";
}

function getRarityClass(name) {
    return getRarityText(name).toLowerCase();
}
let currentFilter = "All";

function setFilter(status) {
    currentFilter = status;
    showLibrary();
}

function getEstimatedValue(name) {
    const values = {
        "Ho-Oh": 12.00,
        "Ninetales": 5.00,
        "Ninetails": 5.00,
        "Garbodor": 4.00,
        "Donphan": 3.50,
        "Avalugg": 3.00,
        "Meowstic": 2.50,
        "Quilladin": 2.00,
        "Delibird": 1.80,
        "Vulpix": 1.50,
        "Froakie": 1.50,
        "Mareep": 1.20,
        "Phantump": 1.00,
        "Pumpkaboo": 1.00,
        "Pumkaboo": 1.00,
        "Stunky": 0.80,
        "Zubat": 0.80,
        "Litleo": 0.80,
        "Bergmite": 0.70,
        "Baltoy": 0.70,
        "Philippe": 0.50
    };

    return values[name] || 1.00;
}

function showLibrary() {
    const collection = JSON.parse(localStorage.getItem("collection")) || {};
    const cards = Object.values(collection).sort((a, b) =>
        a.name.localeCompare(b.name)
    );
    const library = document.getElementById("profile-library");
    const search = document.getElementById("search-bar").value.toLowerCase();

    library.innerHTML = "";

    document.getElementById("total-cards").innerText = cards.length;
    document.getElementById("trade-count").innerText = cards.filter(card => card.status === "Trade").length;
    document.getElementById("wishlist-count").innerText = cards.filter(card => card.status === "Want").length;

    let totalValue = 0;
    let topCardName = "None";
    let topCardValue = 0;

    cards.forEach(card => {
        const value = getEstimatedValue(card.name) * Number(card.quantity || 1);
        totalValue += value;

        if (value > topCardValue) {
            topCardValue = value;
            topCardName = card.name;
        }
    });

    document.getElementById("collection-value").innerText = `$${totalValue.toFixed(2)}`;
    document.getElementById("top-card").innerText = topCardName;

    cards.forEach(card => {
        const matchesSearch = card.name.toLowerCase().includes(search);
        const matchesFilter =
            currentFilter === "All" ||
            (currentFilter === "Favourite" && card.favourite) ||
            (card.status || "Keep") === currentFilter;

        if (!matchesSearch || !matchesFilter) return;

        const item = document.createElement("div");
        item.className = "pokemon-tile";

        item.innerHTML = `
            <div class="card-link">
                <a href="/card/${card.name}">
                    <img
                        src="/static/card_images/${card.name}.png"
                        onerror="this.style.display='none'"
                    >
                </a>
                <div class="pokemon-info">
                    <h2>${card.name}</h2>
                    <p>x${card.quantity}</p>
                    <div class="library-actions">
                        <button onclick="removeOneCard('${card.id}')">-1</button>
                        <button onclick="deleteCard('${card.id}')">Delete</button>
                    </div>

                    <span class="status-badge">${card.status || "Keep"}</span>
                    <button class="fav-btn" onclick="toggleFavourite(event, '${card.id}')">
                        ${card.favourite ? "★ Favourite" : "☆ Favourite"}
                    </button>
                    <span class="rarity-badge rarity-${getRarityClass(card.name)}">
                    ${getRarityText(card.name)}
                </span>    
                    </div>
            </div>
        `;

        library.appendChild(item);
    });
}

function removeOneCard(cardId) {
    const collection =
        JSON.parse(localStorage.getItem("collection")) || {};

    if (!collection[cardId]) return;

    collection[cardId].quantity--;

    if (collection[cardId].quantity <= 0) {
        delete collection[cardId];
    }

    localStorage.setItem(
        "collection",
        JSON.stringify(collection)
    );

    showLibrary();
}

function deleteCard(cardId) {
    const collection =
        JSON.parse(localStorage.getItem("collection")) || {};

    const confirmed =
        confirm("Delete this card from your library?");

    if (!confirmed) return;

    delete collection[cardId];

    localStorage.setItem(
        "collection",
        JSON.stringify(collection)
    );

    showLibrary();
}

function exportCollection() {
    const collection =
        JSON.parse(localStorage.getItem("collection")) || {};

    const cards = Object.values(collection);

    if (cards.length === 0) {
        alert("No cards to export.");
        return;
    }

    let csv =
        "Name,Quantity,Status,Favourite,Date\n";

    cards.forEach(card => {
        csv +=
            `${card.name},${card.quantity},${card.status || "Keep"},${card.favourite ? "Yes" : "No"},${card.date || ""}\n`;
    });

    const blob = new Blob(
        [csv],
        { type: "text/csv" }
    );

    const link = document.createElement("a");

    link.href =
        URL.createObjectURL(blob);

    link.download =
        "pokescan_collection.csv";

    link.click();
}


function toggleFavourite(event, cardId) {
    event.preventDefault();
    event.stopPropagation();

    const collection = JSON.parse(localStorage.getItem("collection")) || {};

    if (collection[cardId]) {
        collection[cardId].favourite = !collection[cardId].favourite;
        localStorage.setItem("collection", JSON.stringify(collection));
        showLibrary();
    }
}

function removeOneCard(cardId) {

    const collection =
        JSON.parse(localStorage.getItem("collection")) || {};

    if (!collection[cardId]) return;

    collection[cardId].quantity--;

    if (collection[cardId].quantity <= 0) {
        delete collection[cardId];
    }

    localStorage.setItem(
        "collection",
        JSON.stringify(collection)
    );

    showLibrary();
}

function deleteCard(cardId) {

    const collection =
        JSON.parse(localStorage.getItem("collection")) || {};

    delete collection[cardId];

    localStorage.setItem(
        "collection",
        JSON.stringify(collection)
    );

    showLibrary();
}

function showCardsView() {
    document.getElementById("profile-library").classList.remove("hidden");
    document.getElementById("pokemon-view").classList.add("hidden");
}

function showPokemonView() {
    document.getElementById("profile-library").classList.add("hidden");
    document.getElementById("pokemon-view").classList.remove("hidden");

    renderPokemonView();
}

function renderPokemonView() {
    const sprites = {
        "Ho-Oh": "250",
        "Vulpix": "37",
        "Ninetales": "38",
        "Ninetails": "38",
        "Meowstic": "678",
        "Quilladin": "651",
        "Delibird": "225",
        "Froakie": "656",
        "Mareep": "179",
        "Phantump": "708",
        "Pumpkaboo": "710",
        "Pumkaboo": "710",
        "Stunky": "434",
        "Zubat": "41",
        "Litleo": "667",
        "Bergmite": "712",
        "Baltoy": "343",
        "Donphan": "232",
        "Avalugg": "713",
        "Garbodor": "569"
    };

    const knownVariants = {
        "Ho-Oh": 37,
        "Vulpix": 52,
        "Ninetales": 34,
        "Ninetails": 34,
        "Meowstic": 18,
        "Quilladin": 12,
        "Delibird": 22,
        "Froakie": 48,
        "Mareep": 41,
        "Phantump": 19,
        "Pumpkaboo": 20,
        "Pumkaboo": 20,
        "Stunky": 16,
        "Zubat": 80,
        "Litleo": 18,
        "Bergmite": 12,
        "Baltoy": 25,
        "Donphan": 35,
        "Avalugg": 14,
        "Garbodor": 34
    };

    const collection = JSON.parse(localStorage.getItem("collection")) || {};
    const container = document.getElementById("pokemon-view");

    container.innerHTML = "";

    Object.values(collection).forEach(card => {
        const pokeId = sprites[card.name];

        if (!pokeId) return;

        const tile = document.createElement("div");
        tile.className = "pokemon-sprite-tile";

        tile.innerHTML = `
            <a href="/card/${card.name}">
                <img
                    src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/${pokeId}.gif"
                    onerror="
                        this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${pokeId}.png'
                    "
                >

                <h3>${card.name}</h3>

                <span class="pokemon-owned-badge">
                    Collected
                </span>

                <p><strong>You own:</strong> ${card.quantity} card(s)</p>

                <p><strong>Known card variants:</strong> ${knownVariants[card.name] || "Unknown"}</p>

                <p class="pokemon-view-note">
                    Click to view Pokémon showcase
                </p>
            </a>
        `;

        container.appendChild(tile);
    });
}

window.addEventListener("load", showLibrary);
</script>

</body>
</html>
